name: Build Pwnagotchi Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Architecture to build'
        required: true
        default: 'both'
        type: choice
        options:
          - '32bit'
          - '64bit'
          - 'both'

jobs:
  build-32bit:
    if: ${{ github.event_name == 'push' || github.event.inputs.architecture == '32bit' || github.event.inputs.architecture == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          # Remove large pre-installed packages to free ~20GB
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/share/swift /usr/local/graalvm /usr/local/share/chromium \
            /usr/local/lib/node_modules /opt/az 2>/dev/null || true
          sudo apt-get purge -y \
            google-cloud-cli azure-cli microsoft-edge-stable \
            google-chrome-stable dotnet-* aspnetcore-* 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Checkout pwn-gen-bumchinz
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static debootstrap zerofree zip \
            dosfstools e2fsprogs libarchive-tools libcap2-bin grep rsync xz-utils \
            file git curl bc gpg pigz xxd arch-test bmap-tools kmod \
            qemu-utils qemu-system-arm qemu-user gcc-arm-linux-gnueabihf

      - name: Clone pi-gen 32bit
        run: |
          git clone --depth 1 https://github.com/RPI-Distro/pi-gen.git pi-gen-32bit

      - name: Configure build
        run: |
          # Set absolute paths in config (avoid ${HOME} expansion issues with sudo)
          RUNNER_HOME="$HOME"
          mkdir -p "${RUNNER_HOME}/pwn-build/work-32bit"
          mkdir -p "${RUNNER_HOME}/pwn-build/images"
          sed -i "s|^WORK_DIR=.*|WORK_DIR=\"${RUNNER_HOME}/pwn-build/work-32bit\"|" config-32bit
          sed -i "s|^DEPLOY_DIR=.*|DEPLOY_DIR=\"${RUNNER_HOME}/pwn-build/images\"|" config-32bit
          echo "=== Config ==="
          cat config-32bit

      - name: Cross-compile Go binaries
        run: |
          # Cross-compile bettercap + pwngrid on x86 host to avoid 12+ hour
          # QEMU ARM emulation builds that exceed the 6h GitHub Actions timeout.
          # This step takes ~5 minutes instead.

          echo "=== Installing Go on host ==="
          GO_VERSION="1.24.4"
          wget -q "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf "go${GO_VERSION}.linux-amd64.tar.gz"
          rm "go${GO_VERSION}.linux-amd64.tar.gz"
          export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH
          go version

          echo "=== Setting up armhf cross-compilation libraries ==="
          sudo dpkg --add-architecture armhf
          # Restrict existing repos to amd64 to prevent 404 for armhf
          sudo sed -i 's/^deb http/deb [arch=amd64] http/' /etc/apt/sources.list 2>/dev/null || true
          for f in /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i 's/^deb http/deb [arch=amd64] http/' "$f" 2>/dev/null || true
          done
          # Handle DEB822 format (Ubuntu 24.04+)
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && ! grep -q "^Architectures:" "$f" && \
              sudo sed -i '/^Types:/a Architectures: amd64' "$f" 2>/dev/null || true
          done
          # Add armhf from Ubuntu ports mirror
          CODENAME=$(lsb_release -cs)
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports ${CODENAME} main universe" \
            | sudo tee /etc/apt/sources.list.d/armhf-cross.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates main universe" \
            | sudo tee -a /etc/apt/sources.list.d/armhf-cross.list
          sudo apt-get update
          sudo apt-get install -y libpcap-dev:armhf libusb-1.0-0-dev:armhf \
            libnetfilter-queue-dev:armhf 2>/dev/null || \
            sudo apt-get install -y libpcap-dev:armhf libusb-1.0-0-dev:armhf || \
            sudo apt-get install -y libpcap-dev:armhf

          mkdir -p stage3/03-bettercap-pwngrid/files

          echo "=== Cross-compiling bettercap for armhf ==="
          git clone --depth 1 https://github.com/bettercap/bettercap.git /tmp/bettercap-src
          cd /tmp/bettercap-src
          CC=arm-linux-gnueabihf-gcc \
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH=arm \
          GOARM=6 \
          PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig \
          CGO_LDFLAGS="-L/usr/lib/arm-linux-gnueabihf" \
            go build -trimpath -o "$GITHUB_WORKSPACE/stage3/03-bettercap-pwngrid/files/bettercap" .
          echo "bettercap: OK"

          echo "=== Cross-compiling pwngrid for armhf ==="
          git clone --depth 1 https://github.com/jayofelony/pwngrid.git /tmp/pwngrid-src
          cd /tmp/pwngrid-src
          CC=arm-linux-gnueabihf-gcc \
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH=arm \
          GOARM=6 \
          PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig \
          CGO_LDFLAGS="-L/usr/lib/arm-linux-gnueabihf" \
            go build -trimpath -o "$GITHUB_WORKSPACE/stage3/03-bettercap-pwngrid/files/pwngrid" . 2>/dev/null || \
          CC=arm-linux-gnueabihf-gcc \
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH=arm \
          GOARM=6 \
          PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig \
          CGO_LDFLAGS="-L/usr/lib/arm-linux-gnueabihf" \
            go build -trimpath -o "$GITHUB_WORKSPACE/stage3/03-bettercap-pwngrid/files/pwngrid" ./cmd/pwngrid
          echo "pwngrid: OK"

          echo "=== Pre-built binaries ==="
          ls -la "$GITHUB_WORKSPACE/stage3/03-bettercap-pwngrid/files/"
          file "$GITHUB_WORKSPACE/stage3/03-bettercap-pwngrid/files/"*

      - name: Build 32-bit image
        run: |
          sudo ./pi-gen-32bit/build.sh -c config-32bit

      - name: Prepare artifact
        run: |
          # pi-gen with DEPLOY_COMPRESSION=xz already produces .img.xz
          echo "=== Build output ==="
          sudo ls -lah $HOME/pwn-build/images/ || true
          # Fix ownership so upload-artifact can read the files
          sudo chown -R $USER:$USER $HOME/pwn-build/images/ 2>/dev/null || true

      - name: Upload 32-bit image
        uses: actions/upload-artifact@v4
        with:
          name: pwnagotchi-bumchinz-32bit
          path: ~/pwn-build/images/*pwnagotchi-bumchinz-32bit*
          retention-days: 30
          if-no-files-found: error

  build-64bit:
    if: ${{ github.event_name == 'push' || github.event.inputs.architecture == '64bit' || github.event.inputs.architecture == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/share/swift /usr/local/graalvm /usr/local/share/chromium \
            /usr/local/lib/node_modules /opt/az 2>/dev/null || true
          sudo apt-get purge -y \
            google-cloud-cli azure-cli microsoft-edge-stable \
            google-chrome-stable dotnet-* aspnetcore-* 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Checkout pwn-gen-bumchinz
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils quilt parted qemu-user-static debootstrap zerofree zip \
            dosfstools e2fsprogs libarchive-tools libcap2-bin grep rsync xz-utils \
            file git curl bc gpg pigz xxd arch-test bmap-tools kmod \
            qemu-utils qemu-system-arm qemu-user gcc-aarch64-linux-gnu

      - name: Clone pi-gen 64bit
        run: |
          git clone --depth 1 -b arm64 https://github.com/RPI-Distro/pi-gen.git pi-gen-64bit

      - name: Configure build
        run: |
          RUNNER_HOME="$HOME"
          mkdir -p "${RUNNER_HOME}/pwn-build/work-64bit"
          mkdir -p "${RUNNER_HOME}/pwn-build/images"
          sed -i "s|^WORK_DIR=.*|WORK_DIR=\"${RUNNER_HOME}/pwn-build/work-64bit\"|" config-64bit
          sed -i "s|^DEPLOY_DIR=.*|DEPLOY_DIR=\"${RUNNER_HOME}/pwn-build/images\"|" config-64bit
          echo "=== Config ==="
          cat config-64bit

      - name: Cross-compile Go binaries
        run: |
          echo "=== Installing Go on host ==="
          GO_VERSION="1.24.4"
          wget -q "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf "go${GO_VERSION}.linux-amd64.tar.gz"
          rm "go${GO_VERSION}.linux-amd64.tar.gz"
          export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH
          go version

          echo "=== Setting up arm64 cross-compilation libraries ==="
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb http/deb [arch=amd64] http/' /etc/apt/sources.list 2>/dev/null || true
          for f in /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i 's/^deb http/deb [arch=amd64] http/' "$f" 2>/dev/null || true
          done
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && ! grep -q "^Architectures:" "$f" && \
              sudo sed -i '/^Types:/a Architectures: amd64' "$f" 2>/dev/null || true
          done
          CODENAME=$(lsb_release -cs)
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME} main universe" \
            | sudo tee /etc/apt/sources.list.d/arm64-cross.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates main universe" \
            | sudo tee -a /etc/apt/sources.list.d/arm64-cross.list
          sudo apt-get update
          sudo apt-get install -y libpcap-dev:arm64 libusb-1.0-0-dev:arm64 \
            libnetfilter-queue-dev:arm64 2>/dev/null || \
            sudo apt-get install -y libpcap-dev:arm64 libusb-1.0-0-dev:arm64 || \
            sudo apt-get install -y libpcap-dev:arm64

          mkdir -p stage3/03-bettercap-pwngrid/files

          echo "=== Cross-compiling bettercap for arm64 ==="
          git clone --depth 1 https://github.com/bettercap/bettercap.git /tmp/bettercap-src
          cd /tmp/bettercap-src
          CC=aarch64-linux-gnu-gcc \
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH=arm64 \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
          CGO_LDFLAGS="-L/usr/lib/aarch64-linux-gnu" \
            go build -trimpath -o "$GITHUB_WORKSPACE/stage3/03-bettercap-pwngrid/files/bettercap" .
          echo "bettercap: OK"

          echo "=== Cross-compiling pwngrid for arm64 ==="
          git clone --depth 1 https://github.com/jayofelony/pwngrid.git /tmp/pwngrid-src
          cd /tmp/pwngrid-src
          CC=aarch64-linux-gnu-gcc \
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH=arm64 \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
          CGO_LDFLAGS="-L/usr/lib/aarch64-linux-gnu" \
            go build -trimpath -o "$GITHUB_WORKSPACE/stage3/03-bettercap-pwngrid/files/pwngrid" . 2>/dev/null || \
          CC=aarch64-linux-gnu-gcc \
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH=arm64 \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
          CGO_LDFLAGS="-L/usr/lib/aarch64-linux-gnu" \
            go build -trimpath -o "$GITHUB_WORKSPACE/stage3/03-bettercap-pwngrid/files/pwngrid" ./cmd/pwngrid
          echo "pwngrid: OK"

          echo "=== Pre-built binaries ==="
          ls -la "$GITHUB_WORKSPACE/stage3/03-bettercap-pwngrid/files/"
          file "$GITHUB_WORKSPACE/stage3/03-bettercap-pwngrid/files/"*

      - name: Build 64-bit image
        run: |
          sudo ./pi-gen-64bit/build.sh -c config-64bit

      - name: Prepare artifact
        run: |
          echo "=== Build output ==="
          sudo ls -lah $HOME/pwn-build/images/ || true
          sudo chown -R $USER:$USER $HOME/pwn-build/images/ 2>/dev/null || true

      - name: Upload 64-bit image
        uses: actions/upload-artifact@v4
        with:
          name: pwnagotchi-bumchinz-64bit
          path: ~/pwn-build/images/*pwnagotchi-bumchinz-64bit*
          retention-days: 30
          if-no-files-found: error

  release:
    needs: [build-32bit, build-64bit]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    
    steps:
      - name: Download 32-bit artifact
        uses: actions/download-artifact@v4
        with:
          name: pwnagotchi-bumchinz-32bit
          path: ./release

      - name: Download 64-bit artifact
        uses: actions/download-artifact@v4
        with:
          name: pwnagotchi-bumchinz-64bit
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          body: |
            ## Pwnagotchi Mr Bumchinz Edition ${{ github.ref_name }}
            
            ### Downloads
            - `pwnagotchi-bumchinz-32bit.img.xz` - Works on ALL Pi models (Zero, Zero W, 3, 4, 5)
            - `pwnagotchi-bumchinz-64bit.img.xz` - Pi 3, 4, 5 only (better performance)
            
            ### What's Included
            - PwnaUI native C theme engine with 17+ themes
            - Bluetooth GPS receiver for wardriving
            - Mode toggle via PiSugar button (AUTO/MANU/AI)
            - Nexmon stability plugin
            - WebUI at http://<device>.local/crackcity.html
            - Hostname/mDNS sync from config
            
            ### Installation
            1. Download the appropriate image for your Pi
            2. Flash with Raspberry Pi Imager or balenaEtcher
            3. Insert SD card and power on
            
            Default credentials: `pi` / `raspberry`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
